version: '3.8'

services:
  # ==================== BACKEND ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nlp-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/models:/app/models
    environment:
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=5000
      - LOG_LEVEL=INFO
      - MAX_TEXT_LENGTH=100000
    restart: unless-stopped
    networks:
      - nlp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:5000/api
    container_name: nlp-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nlp-network

networks:
  nlp-network:
    driver: bridge
    name: nlp-network

volumes:
  backend-logs:
  backend-models: